<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <script>
    Office.onReady(() => {});

    // Called by the "Send Securely" ribbon button when in function-command mode.
    // Opens the task pane.
    function openTaskPane(event) {
      Office.addin.showAsTaskpane();
      event.completed();
    }

    // Register commands
    Office.actions.associate("openTaskPane", openTaskPane);
  </script>
</head>
<body></body>
</html>
